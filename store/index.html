<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Open in QChat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>
(function() {
  var appStoreURL = 'https://apps.apple.com/app/id6739166946';
  var link = window.location.href;
  var storePrefix = '/QChatWelcome/store/';
  var appURL = null;
  var vendorId = '';

  if (window.location.pathname.indexOf(storePrefix) === 0) {
    vendorId = decodeURIComponent(window.location.pathname.slice(storePrefix.length).split('/')[0] || '');
  }
  if (!vendorId) {
    vendorId = new URLSearchParams(window.location.search || '').get('vendorId') || '';
  }
  if (vendorId) {
    appURL = 'qchat://store/' + encodeURIComponent(vendorId);
  }

  var meta = document.createElement('meta');
  meta.name = 'apple-itunes-app';
  meta.content = 'app-id=6739166946, app-argument=' + link;
  document.head.appendChild(meta);

  if (appURL) {
    window.location.href = appURL;
  }

  setTimeout(function() {
    window.location.href = appStoreURL;
  }, appURL ? 3500 : 1000);
})();
</script>
</head>
<body>
<p>Открываем QChat…</p>
</body>
</html>
